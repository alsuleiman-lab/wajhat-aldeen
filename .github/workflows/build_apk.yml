name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Download Amiri Font
        run: |
          mkdir -p assets/fonts
          curl -L "https://fonts.gstatic.com/s/amiri/v27/J7aRnpd8CGxBHqUpvrIw74NL.ttf" -o assets/fonts/Amiri-Regular.ttf
          curl -L "https://fonts.gstatic.com/s/amiri/v27/J7acnpd8CGxBHp2VkaY6zp5yHOc.ttf" -o assets/fonts/Amiri-Bold.ttf
          curl -L "https://fonts.gstatic.com/s/tajawal/v9/Iura6YBj_oCad4k1l5qjHqBfVMI.ttf" -o assets/fonts/Tajawal-Regular.ttf
          curl -L "https://fonts.gstatic.com/s/tajawal/v9/Iura6YBj_oCad4k1l8ajHqBfVMI.ttf" -o assets/fonts/Tajawal-Medium.ttf
          curl -L "https://fonts.gstatic.com/s/tajawal/v9/Iura6YBj_oCad4k1nMejHqBfVMI.ttf" -o assets/fonts/Tajawal-Bold.ttf

      - name: Download Uthman Font
        run: |
          curl -L "https://github.com/mustafa0x/qpc-fonts/raw/master/UthmanTN1B-Regular.ttf" \
            -o assets/fonts/UthmanTN1B-Regular.ttf || \
          curl -L "https://fonts.gstatic.com/s/amiri/v27/J7aRnpd8CGxBHqUpvrIw74NL.ttf" \
            -o assets/fonts/UthmanTN1B-Regular.ttf

      - name: Get Flutter packages
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release --no-shrink

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wajhat-aldeen-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
